name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Quick checks that fail fast
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --features "native,neural,graph" -- -D warnings

  # Version consistency check
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"

          # Extract version from git tag
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Git tag version: $TAG_VERSION"

          # Compare versions
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  Git tag:    v$TAG_VERSION"
            exit 1
          fi

          echo "✅ Versions match: $CARGO_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release --features graph

      - name: Verify binary version matches
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          BINARY_VERSION=$(./target/release/narsil-mcp --version | sed 's/narsil-mcp //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Binary --version:   $BINARY_VERSION"

          if [ "$BINARY_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ ERROR: Binary version mismatch!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  Binary:     $BINARY_VERSION"
            exit 1
          fi

          echo "✅ Binary version matches: $BINARY_VERSION"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint, version-check]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit

  # Verify tests pass before releasing
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, version-check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Run tests
        run: cargo test --features "native,neural,graph" --verbose -- --test-threads=1

  # Publish to crates.io (skip for pre-release versions)
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [lint, version-check, security, test, build-binaries]
    timeout-minutes: 20
    # Only publish to crates.io for stable releases (not beta, alpha, rc, etc.)
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Publish to crates.io
        # --allow-dirty because Cargo.lock is auto-updated by cargo build and may differ slightly
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty

  # Build release binaries for all platforms
  build-binaries:
    name: Build Release Binaries
    needs: [lint, security, test]
    uses: ./.github/workflows/build-binaries.yml
    with:
      features: graph

  # Create GitHub Release with all binaries
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish]
    if: >-
      always() &&
      needs.build-binaries.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Get version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}

          # Get absolute path to release-assets directory
          RELEASE_DIR="$(pwd)/release-assets"

          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")

            if [[ "$artifact_name" == *"windows"* ]]; then
              # Windows: Create .zip
              (cd "$dir" && zip "${RELEASE_DIR}/narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.zip" narsil-mcp.exe)
              # Generate SHA256
              (cd release-assets && shasum -a 256 "narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.zip" > "narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.zip.sha256")
            else
              # Unix: Create .tar.gz
              (cd "$dir" && tar -czf "${RELEASE_DIR}/narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.tar.gz" narsil-mcp)
              # Generate SHA256
              (cd release-assets && shasum -a 256 "narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.tar.gz" > "narsil-mcp-v${VERSION}-${artifact_name#narsil-mcp-}.tar.gz.sha256")
            fi
          done

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm (after GitHub Release so binaries are available)
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm package version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd npm
          # Update version in package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated npm/package.json to version $VERSION"
          cat package.json

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Update Homebrew tap formula with new version and SHA256 hashes
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    timeout-minutes: 10
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 sidecar files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE_URL="https://github.com/postrv/narsil-mcp/releases/download/v${VERSION}"
          mkdir -p sha256
          for target in macos-x86_64 macos-aarch64 linux-x86_64 linux-aarch64; do
            curl -fSL "${BASE_URL}/narsil-mcp-v${VERSION}-${target}.tar.gz.sha256" -o "sha256/${target}.sha256"
          done

      - name: Parse SHA256 hashes
        id: hashes
        run: |
          echo "macos_x86_64=$(awk '{print $1}' sha256/macos-x86_64.sha256)" >> "$GITHUB_OUTPUT"
          echo "macos_aarch64=$(awk '{print $1}' sha256/macos-aarch64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(awk '{print $1}' sha256/linux-x86_64.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_aarch64=$(awk '{print $1}' sha256/linux-aarch64.sha256)" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: postrv/homebrew-narsil
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > Formula/narsil-mcp.rb << 'FORMULA'
          class NarsilMcp < Formula
            desc "Blazingly fast MCP server for code intelligence"
            homepage "https://github.com/postrv/narsil-mcp"
            version "VERSION_PLACEHOLDER"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/postrv/narsil-mcp/releases/download/vVERSION_PLACEHOLDER/narsil-mcp-vVERSION_PLACEHOLDER-macos-x86_64.tar.gz"
                sha256 "MACOS_X86_64_PLACEHOLDER"
              elsif Hardware::CPU.arm?
                url "https://github.com/postrv/narsil-mcp/releases/download/vVERSION_PLACEHOLDER/narsil-mcp-vVERSION_PLACEHOLDER-macos-aarch64.tar.gz"
                sha256 "MACOS_AARCH64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/postrv/narsil-mcp/releases/download/vVERSION_PLACEHOLDER/narsil-mcp-vVERSION_PLACEHOLDER-linux-x86_64.tar.gz"
                sha256 "LINUX_X86_64_PLACEHOLDER"
              elsif Hardware::CPU.arm?
                url "https://github.com/postrv/narsil-mcp/releases/download/vVERSION_PLACEHOLDER/narsil-mcp-vVERSION_PLACEHOLDER-linux-aarch64.tar.gz"
                sha256 "LINUX_AARCH64_PLACEHOLDER"
              end
            end

            def install
              bin.install "narsil-mcp"
            end

            def caveats
              <<~EOS
                To use narsil-mcp with AI assistants:

                Claude Desktop:
                  Add to ~/Library/Application Support/Claude/claude_desktop_config.json:
                  {
                    "mcpServers": {
                      "narsil-mcp": {
                        "command": "narsil-mcp",
                        "args": ["--repos", "/path/to/your/projects"]
                      }
                    }
                  }

                VS Code with Copilot:
                  Create .vscode/mcp.json in your workspace:
                  {
                    "servers": {
                      "narsil-mcp": {
                        "command": "narsil-mcp",
                        "args": ["--repos", "${workspaceFolder}"]
                      }
                    }
                  }

                Cursor:
                  Create .cursor/mcp.json in your project:
                  {
                    "mcpServers": {
                      "narsil-mcp": {
                        "command": "narsil-mcp",
                        "args": ["--repos", "."]
                      }
                    }
                  }

                Documentation: https://github.com/postrv/narsil-mcp
              EOS
            end

            test do
              # Test that the binary exists and is executable
              assert_match version.to_s, shell_output("#{bin}/narsil-mcp --version")
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/narsil-mcp.rb
          sed -i "s/MACOS_X86_64_PLACEHOLDER/${{ steps.hashes.outputs.macos_x86_64 }}/g" Formula/narsil-mcp.rb
          sed -i "s/MACOS_AARCH64_PLACEHOLDER/${{ steps.hashes.outputs.macos_aarch64 }}/g" Formula/narsil-mcp.rb
          sed -i "s/LINUX_X86_64_PLACEHOLDER/${{ steps.hashes.outputs.linux_x86_64 }}/g" Formula/narsil-mcp.rb
          sed -i "s/LINUX_AARCH64_PLACEHOLDER/${{ steps.hashes.outputs.linux_aarch64 }}/g" Formula/narsil-mcp.rb

          echo "Generated formula:"
          cat Formula/narsil-mcp.rb

      - name: Commit and push
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/narsil-mcp.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already current"
          else
            git commit -m "narsil-mcp ${VERSION}"
            git push
          fi

  # Update Scoop bucket manifest with new version and SHA256 hash
  update-scoop:
    name: Update Scoop Bucket
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    timeout-minutes: 10
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 sidecar file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl -fSL "https://github.com/postrv/narsil-mcp/releases/download/v${VERSION}/narsil-mcp-v${VERSION}-windows-x86_64.zip.sha256" -o windows.sha256

      - name: Parse SHA256 hash
        id: hash
        run: echo "windows_x86_64=$(awk '{print $1}' windows.sha256)" >> "$GITHUB_OUTPUT"

      - name: Checkout Scoop bucket
        uses: actions/checkout@v6
        with:
          repository: postrv/scoop-narsil
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate manifest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          HASH=${{ steps.hash.outputs.windows_x86_64 }}
          cat > bucket/narsil-mcp.json << 'MANIFEST'
          {
              "version": "VERSION_PLACEHOLDER",
              "description": "Blazingly fast MCP server for code intelligence",
              "homepage": "https://github.com/postrv/narsil-mcp",
              "license": "MIT OR Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/postrv/narsil-mcp/releases/download/vVERSION_PLACEHOLDER/narsil-mcp-vVERSION_PLACEHOLDER-windows-x86_64.zip",
                      "hash": "HASH_PLACEHOLDER"
                  }
              },
              "bin": "narsil-mcp.exe",
              "checkver": {
                  "github": "https://github.com/postrv/narsil-mcp"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/postrv/narsil-mcp/releases/download/v$version/narsil-mcp-v$version-windows-x86_64.zip"
                      }
                  },
                  "hash": {
                      "url": "$url.sha256"
                  }
              },
              "notes": [
                  "To use narsil-mcp with AI assistants:",
                  "",
                  "Claude Desktop:",
                  "  Add to %APPDATA%\\Claude\\claude_desktop_config.json:",
                  "  {",
                  "    \"mcpServers\": {",
                  "      \"narsil-mcp\": {",
                  "        \"command\": \"narsil-mcp\",",
                  "        \"args\": [\"--repos\", \"C:\\\\path\\\\to\\\\your\\\\projects\"]",
                  "      }",
                  "    }",
                  "  }",
                  "",
                  "VS Code with Copilot:",
                  "  Create .vscode\\mcp.json in your workspace:",
                  "  {",
                  "    \"servers\": {",
                  "      \"narsil-mcp\": {",
                  "        \"command\": \"narsil-mcp\",",
                  "        \"args\": [\"--repos\", \"${workspaceFolder}\"]",
                  "      }",
                  "    }",
                  "  }",
                  "",
                  "Cursor:",
                  "  Create .cursor\\mcp.json in your project:",
                  "  {",
                  "    \"mcpServers\": {",
                  "      \"narsil-mcp\": {",
                  "        \"command\": \"narsil-mcp\",",
                  "        \"args\": [\"--repos\", \".\"]",
                  "      }",
                  "    }",
                  "  }",
                  "",
                  "Documentation: https://github.com/postrv/narsil-mcp"
              ]
          }
          MANIFEST

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" bucket/narsil-mcp.json
          sed -i "s/HASH_PLACEHOLDER/${HASH}/g" bucket/narsil-mcp.json

          echo "Generated manifest:"
          cat bucket/narsil-mcp.json

      - name: Commit and push
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/narsil-mcp.json
          if git diff --cached --quiet; then
            echo "Scoop manifest is already current"
          else
            git commit -m "narsil-mcp ${VERSION}"
            git push
          fi
