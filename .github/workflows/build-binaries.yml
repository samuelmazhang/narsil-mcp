name: Build Binaries

on:
  workflow_call:
    inputs:
      features:
        description: 'Cargo features to enable'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: narsil-mcp-linux-x86_64
            binary: narsil-mcp
          # Native ARM64 Linux build via GitHub-hosted Graviton runners.
          # No cross-compile toolchain required — addresses issue #20
          # for Raspberry Pi, AWS Graviton, and Apple-silicon-via-Docker
          # users who previously had no prebuilt binary.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: narsil-mcp-linux-aarch64
            binary: narsil-mcp
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: narsil-mcp-macos-x86_64
            binary: narsil-mcp
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: narsil-mcp-macos-aarch64
            binary: narsil-mcp
          # Pin Windows release builds to the stable VS2022 image. The
          # moving windows-latest image has broken rust-cache during hosted
          # image transitions, which can fail the binary job before compile.
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: narsil-mcp-windows-x86_64
            binary: narsil-mcp.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-release"
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          $nasm = Get-ChildItem -Path "$env:ProgramFiles\NASM", "$env:ChocolateyInstall\lib\nasm" -Filter nasm.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $nasm) {
            throw "nasm.exe was not found after Chocolatey installation"
          }
          $nasm.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $nasm.FullName -v

      - name: Build release binary
        run: |
          if [ -n "${{ inputs.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features "${{ inputs.features }}"
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            strip target/${{ matrix.target }}/release/narsil-mcp
          elif [[ "${{ matrix.target }}" == *"darwin"* ]]; then
            strip -x target/${{ matrix.target }}/release/narsil-mcp
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error
